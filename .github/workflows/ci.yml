name: InterLink Architecture CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Code Formatting & Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Rustfmt Check
        run: cargo fmt --all -- --check

  build_core:
    name: Core Daemon & Relayer
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Build Workspace (Core & Relayer)
        run: cargo build --verbose

  build_circuits:
    name: Halo2 ZK Circuits
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Build ZK Circuits
        run: cargo build -p circuits --verbose

  build_solana:
    name: Solana Hub Gateway
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Build Solana Gateway
        working-directory: ./contracts/solana
        run: cargo build --verbose

  build_cosmos:
    name: Cosmos Spoke Gateway
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Build Cosmos Gateway
        working-directory: ./contracts/cosmos
        run: cargo build --target wasm32-unknown-unknown --verbose
        
  test:
    name: Execute Unified Test Suite
    needs: [build_core, build_circuits, build_solana, build_cosmos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
      - name: Run Tests
        run: cargo test --all --verbose
      - name: Generate InterLink Summary
        if: always()
        run: |
          echo "## ⚡ InterLink Protocol CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "### 🏗️ Pipeline Architecture (DAG)" >> $GITHUB_STEP_SUMMARY
          echo '```mermaid' >> $GITHUB_STEP_SUMMARY
          echo 'graph TD' >> $GITHUB_STEP_SUMMARY
          echo '    L[Lint & Security] --> BC[Build Core]' >> $GITHUB_STEP_SUMMARY
          echo '    L --> BZK[Build ZK Circuits]' >> $GITHUB_STEP_SUMMARY
          echo '    L --> BS[Build Solana Hub]' >> $GITHUB_STEP_SUMMARY
          echo '    L --> BCos[Build Cosmos Spoke]' >> $GITHUB_STEP_SUMMARY
          echo '    BC --> T[Unified Test Suite]' >> $GITHUB_STEP_SUMMARY
          echo '    BZK --> T' >> $GITHUB_STEP_SUMMARY
          echo '    BS --> T' >> $GITHUB_STEP_SUMMARY
          echo '    BCos --> T' >> $GITHUB_STEP_SUMMARY
          echo '    style L fill:#f9f,stroke:#333,stroke-width:2px' >> $GITHUB_STEP_SUMMARY
          echo '    style T fill:#00ff00,stroke:#333,stroke-width:4px' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "#### ✅ Status Overview" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Rust Core | Success |" >> $GITHUB_STEP_SUMMARY
          echo "| ZK Circuits | Success |" >> $GITHUB_STEP_SUMMARY
          echo "| Solana Gateway | Success |" >> $GITHUB_STEP_SUMMARY
          echo "| Cosmos Gateway | Success |" >> $GITHUB_STEP_SUMMARY

